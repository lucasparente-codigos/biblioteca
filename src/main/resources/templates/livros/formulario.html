<!-- src/main/resources/templates/livros/formulario.html -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${livro.id == null ? 'Novo Livro' : 'Editar Livro'} + ' — Biblioteca'"></title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">

<nav class="navbar">
  <a href="/" class="navbar__brand">📚 Biblioteca</a>
  <ul class="navbar__links">
    <li><a href="/autores">Autores</a></li>
    <li><a href="/livros" class="active">Livros</a></li>
  </ul>
</nav>

<main class="page-center">
  <div class="container container--narrow">

    <div class="page-header">
      <h1 class="page-header__title"
          th:text="${livro.id == null ? 'Novo Livro' : 'Editar Livro'}"></h1>
    </div>

    <form th:action="@{${livro.id == null ? '/livros/novo' : '/livros/editar/' + livro.id}}"
          th:object="${livro}"
          method="post">

      <div class="form-group">
        <label for="titulo">Título</label>
        <input type="text"
               id="titulo"
               th:field="*{titulo}"
               th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ex: Dom Casmurro" />
        <p th:if="${#fields.hasErrors('titulo')}"
           th:errors="*{titulo}"
           class="form-error"></p>
      </div>

      <div class="form-group">
        <label for="isbn">ISBN</label>
        <input type="text"
               id="isbn"
               th:field="*{isbn}"
               th:classappend="${#fields.hasErrors('isbn')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ex: 978-3-16-148410-0" />
        <p th:if="${#fields.hasErrors('isbn')}"
           th:errors="*{isbn}"
           class="form-error"></p>
      </div>

      <div class="form-group">
        <label for="anoPublicacao">Ano de Publicação</label>
        <input type="number"
               id="anoPublicacao"
               th:field="*{anoPublicacao}"
               th:classappend="${#fields.hasErrors('anoPublicacao')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ex: 1899" />
        <p th:if="${#fields.hasErrors('anoPublicacao')}"
           th:errors="*{anoPublicacao}"
           class="form-error"></p>
      </div>

      <div class="form-group">
        <label for="autor">Autor</label>
        <select id="autor"
                th:field="*{autor}"
                th:classappend="${#fields.hasErrors('autor')} ? 'is-invalid'"
                class="form-control">
          <option value="">Selecione um autor...</option>
          <option th:each="autorOption : ${autores}"
                  th:value="${autorOption.id}"
                  th:text="${autorOption.nome}"></option>
        </select>
        <p th:if="${#fields.hasErrors('autor')}"
           th:errors="*{autor}"
           class="form-error"></p>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn--success">Salvar</button>
        <a href="/livros" class="btn btn--ghost">Cancelar</a>
      </div>

    </form>

  </div>
</main>

<footer>
  Projeto Biblioteca &mdash; Sistema Acadêmico
</footer>

</body>
</html>
