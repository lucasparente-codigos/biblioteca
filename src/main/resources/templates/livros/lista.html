<!-- src/main/resources/templates/livros/lista.html -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livros — Biblioteca</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">

<nav class="navbar">
  <a href="/" class="navbar__brand">📚 Biblioteca</a>
  <ul class="navbar__links">
    <li><a href="/autores">Autores</a></li>
    <li><a href="/livros" class="active">Livros</a></li>
  </ul>
</nav>

<main style="padding: 2rem 1rem; display: flex; justify-content: center;">
  <div class="container">

    <div class="page-header">
      <h1 class="page-header__title">Livros</h1>
      <a href="/livros/novo" class="btn btn--primary">+ Novo Livro</a>
    </div>

    <!-- Tabela de livros -->
    <div th:if="${not #lists.isEmpty(livros)}" class="table-wrapper">
      <table>
        <thead>
        <tr>
          <th>#</th>
          <th>Título</th>
          <th>ISBN</th>
          <th>Ano</th>
          <th>Autor</th>
          <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="livro : ${livros}">
          <td>
            <span class="badge" th:text="${livro.id}"></span>
          </td>
          <td th:text="${livro.titulo}"></td>
          <td th:text="${livro.isbn}"></td>
          <td th:text="${livro.anoPublicacao}"></td>
          <td th:text="${livro.autor.nome}"></td>
          <td>
            <div class="td-actions">
              <a th:href="@{/livros/editar/{id}(id=${livro.id})}"
                 class="btn btn--warn btn--sm">Editar</a>

              <!-- CORREÇÃO: exclusão via POST, não GET -->
              <form th:action="@{/livros/excluir/{id}(id=${livro.id})}"
                    method="post"
                    onsubmit="return confirm('Tem certeza que deseja excluir este livro?')">
                <button type="submit" class="btn btn--danger btn--sm">Excluir</button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Estado vazio -->
    <div th:if="${#lists.isEmpty(livros)}" class="empty-state">
      <div class="empty-state__icon">📖</div>
      <p class="empty-state__text">Nenhum livro cadastrado ainda.<br>
        <a href="/livros/novo" style="color: var(--accent);">Adicione o primeiro</a>.
      </p>
    </div>

  </div>
</main>

<footer>
  Projeto Biblioteca &mdash; Sistema Acadêmico
</footer>

</body>
</html>
