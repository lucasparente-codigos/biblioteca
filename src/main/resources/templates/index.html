<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body class="page-wrapper">

<nav class="navbar">
    <a href="/" class="navbar__brand">Biblioteca</a>
    <ul class="navbar__links">
        <li><a href="/autores">Autores</a></li>
        <li><a href="/livros">Livros</a></li>
    </ul>
</nav>

<main class="page-center">
    <div class="container container--narrow">
        <div class="home-hero">
            <p class="home-hero__eyebrow">Sistema de Gerenciamento</p>
            <h1 class="home-hero__title">Biblioteca</h1>
            <p class="home-hero__subtitle">Gerencie autores e livros do acervo</p>

            <div class="home-cards">
                <a href="/autores" class="home-card">
                    <span class="home-card__icon">✍️</span>
                    <span class="home-card__label">Cadastro</span>
                    <span class="home-card__title">Autores</span>
                    <span class="home-card__desc">Adicione e gerencie os autores do acervo</span>
                </a>
                <a href="/livros" class="home-card">
                    <span class="home-card__icon">📖</span>
                    <span class="home-card__label">Acervo</span>
                    <span class="home-card__title">Livros</span>
                    <span class="home-card__desc">Cadastre e organize os livros da biblioteca</span>
                </a>
            </div>
        </div>
    </div>
</main>

<footer>
    Projeto Biblioteca &mdash; Sistema Acadêmico
</footer>

</body>
</html>
