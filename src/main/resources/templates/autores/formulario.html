<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${autor.id == null ? 'Novo Autor' : 'Editar Autor'} + ' — Biblioteca'"></title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">

<nav class="navbar">
  <a href="/" class="navbar__brand">Biblioteca</a>
  <ul class="navbar__links">
    <li><a href="/autores" class="active">Autores</a></li>
    <li><a href="/livros">Livros</a></li>
  </ul>
</nav>

<main class="page-center">
  <div class="container container--narrow">

    <div class="page-header">
      <h1 class="page-header__title"
          th:text="${autor.id == null ? 'Novo Autor' : 'Editar Autor'}"></h1>
    </div>

    <form th:action="@{${autor.id == null ? '/autores/novo' : '/autores/editar/' + autor.id}}"
          th:object="${autor}"
          method="post">

      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text"
               id="nome"
               th:field="*{nome}"
               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ex: Machado de Assis" />
        <p th:if="${#fields.hasErrors('nome')}"
           th:errors="*{nome}"
           class="form-error"></p>
      </div>

      <div class="form-group">
        <label for="nacionalidade">Nacionalidade</label>
        <input type="text"
               id="nacionalidade"
               th:field="*{nacionalidade}"
               th:classappend="${#fields.hasErrors('nacionalidade')} ? 'is-invalid'"
               class="form-control"
               placeholder="Ex: Brasileiro" />
        <p th:if="${#fields.hasErrors('nacionalidade')}"
           th:errors="*{nacionalidade}"
           class="form-error"></p>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn--success">Salvar</button>
        <a href="/autores" class="btn btn--ghost">Cancelar</a>
      </div>

    </form>

  </div>
</main>

<footer>
  Projeto Biblioteca &mdash; Sistema Acadêmico
</footer>

</body>
</html>
