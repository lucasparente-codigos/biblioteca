<!-- src/main/resources/templates/autores/lista.html -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autores — Biblioteca</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">

<nav class="navbar">
  <a href="/" class="navbar__brand">Biblioteca</a>
  <ul class="navbar__links">
    <li><a href="/autores" class="active">Autores</a></li>
    <li><a href="/livros">Livros</a></li>
  </ul>
</nav>

<main style="padding: 2rem 1rem; display: flex; justify-content: center;">
  <div class="container">

    <!-- Cabeçalho da página -->
    <div class="page-header">
      <h1 class="page-header__title">Autores</h1>
      <a href="/autores/novo" class="btn btn--primary">+ Novo Autor</a>
    </div>

    <!-- Alerta de erro (ex: tentativa de excluir autor com livros) -->
    <div th:if="${erro}" class="alert alert--danger" th:text="${erro}"></div>

    <!-- Tabela de autores -->
    <div th:if="${not #lists.isEmpty(autores)}" class="table-wrapper">
      <table>
        <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Nacionalidade</th>
          <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="autor : ${autores}">
          <td>
            <span class="badge" th:text="${autor.id}"></span>
          </td>
          <td th:text="${autor.nome}"></td>
          <td th:text="${autor.nacionalidade}"></td>
          <td>
            <div class="td-actions">
              <a th:href="@{/autores/editar/{id}(id=${autor.id})}"
                 class="btn btn--warn btn--sm">Editar</a>

              <!-- CORREÇÃO: exclusão via POST, não GET -->
              <form th:action="@{/autores/excluir/{id}(id=${autor.id})}"
                    method="post"
                    onsubmit="return confirm('Tem certeza que deseja excluir este autor?')">
                <button type="submit" class="btn btn--danger btn--sm">Excluir</button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Estado vazio -->
    <div th:if="${#lists.isEmpty(autores)}" class="empty-state">
      <div class="empty-state__icon">✍️</div>
      <p class="empty-state__text">Nenhum autor cadastrado ainda.<br>
        <a href="/autores/novo" style="color: var(--accent);">Cadastre o primeiro</a>.
      </p>
    </div>

  </div>
</main>

<footer>
  Projeto Biblioteca &mdash; Sistema Acadêmico
</footer>

</body>
</html>
